# Dependabot — supply-chain hygiene for a PUBLISHED protocol package (OWASP MCP04).
# @val-protocol/* deps ship to external developers, so security advisories here
# matter more than for a private repo. chain-verifier itself has zero runtime
# deps by design (Charter §II claim #12); this mainly covers devDeps + actions.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    ignore:
      # Major bumps adopted deliberately, not on Dependabot's schedule:
      # - typescript majors are breaking (TS 6.0 broke the build).
      # - @types/node must track the runtime (Node 20), not run ahead of it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
